name: build

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + verify (MSVC 4.20)
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out portable MSVC 4.20
        uses: actions/checkout@v4
        with:
          repository: itsmattkc/msvc420
          path: msvc420

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: .github/requirements-ci.txt

      - name: Install Python tools
        shell: pwsh
        run: |
          python -m pip install --requirement .github/requirements-ci.txt
          $cmakeBin = python -c "import cmake; print(cmake.CMAKE_BIN_DIR)"
          "CMAKE_BIN=$cmakeBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          python -c "from reccmp.compare.core import Compare"

      - name: Prepare target binary
        shell: bash
        env:
          LEMBALL_GPG_PASSPHRASE: ${{ secrets.LEMBALL_GPG_PASSPHRASE }}
        run: |
          python tools/silence_c4786_in_c2.py msvc420/bin/C2.EXE
          mkdir -p data
          gpg --quiet --batch --yes \
            --decrypt \
            --passphrase "$LEMBALL_GPG_PASSPHRASE" \
            --output data/LEMBALL.EXE \
            data/LEMBALL.EXE.gpg
          make validate-target

      - name: Configure and build
        shell: cmd
        run: |
          call .\msvc420\bin\VCVARS32.BAT x86
          "%CMAKE_BIN%\cmake.exe" -S . -B build-msvc420 -G "NMake Makefiles" -DLEMBALL_ENABLE_WIN32=ON -DCMAKE_TOOLCHAIN_FILE=cmake/msvc420-toolchain.cmake
          "%CMAKE_BIN%\cmake.exe" --build build-msvc420 --target LEMBALL --verbose > build-msvc420\build.log 2>&1
          if errorlevel 1 (
            type build-msvc420\build.log
            exit /b 1
          )

      - name: Verify against original
        run: python tools/compare_rebuilt_functions.py --json build/reccmp-sample.json --silent

      - name: Lint decompilation annotations
        continue-on-error: true
        run: reccmp-decomplint --target LEMBALL src

      - name: Verify virtual tables
        continue-on-error: true
        run: reccmp-vtable --target LEMBALL --no-color

      - name: Compare global data
        continue-on-error: true
        run: reccmp-datacmp --target LEMBALL --no-color

      - name: Generate symbol roadmap
        continue-on-error: true
        run: reccmp-roadmap --target LEMBALL --csv build/reccmp-roadmap.csv

      - name: Diagnose representative stack layout
        continue-on-error: true
        run: reccmp-stackcmp --target LEMBALL 0x00456680

      - name: Aggregate native reccmp report
        if: always()
        shell: pwsh
        run: |
          if (Test-Path build/reccmp-sample.json) {
            $manifest = Get-Content data/manifest.json -Raw | ConvertFrom-Json
            $total = $manifest.summary.internal + $manifest.summary.thunk
            reccmp-aggregate --samples build/reccmp-sample.json --output build/reccmp-aggregate.json --total $total --no-color
          }

      - name: Generate progress report
        if: always()
        run: make report

      - name: Upload progress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LEMBALL_report
          if-no-files-found: error
          path: |
            build/report.json
            build/reccmp-sample.json
            build/reccmp-aggregate.json
            build/reccmp-roadmap.csv
