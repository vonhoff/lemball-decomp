name: status report

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - LEMBALL

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build current pipeline artifacts
        run: |
          make build-base VERSION=${{ matrix.version }}
          make objdiff-config VERSION=${{ matrix.version }}
          make status VERSION=${{ matrix.version }}

      - name: Upload status report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.version }}_status
          path: |
            build/status.json
            objdiff.json
